<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#db2777">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Paulina Match">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Paulina Match</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        rose: { 50: '#fff1f2', 100: '#ffe4e6', 500: '#f43f5e', 600: '#e11d48', 700: '#be123c' },
        pink: { 50: '#fdf2f8', 100: '#fce7f3', 500: '#ec4899', 600: '#db2777', 700: '#be185d' },
      }
    }
  }
}
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
.fade-in { animation: fadeIn 0.35s ease-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.bubble-in { animation: bubbleIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
@keyframes bubbleIn { from { opacity: 0; transform: translateY(10px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
.typing span { display: inline-block; width: 6px; height: 6px; margin: 0 1px; border-radius: 50%; background: #db2777; animation: typingDot 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingDot { 0%, 60%, 100% { opacity: 0.3; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-4px); } }
.grad-bg { background: linear-gradient(160deg, #fdf2f8 0%, #fff1f2 60%, #fefce8 100%); }
textarea { resize: none; }
</style>
</head>
<body class="grad-bg min-h-screen text-gray-900">

<!-- ========= LOGIN ========= -->
<div id="view-login" class="hidden min-h-screen flex items-center justify-center px-6">
  <div class="max-w-sm w-full fade-in">
    <div class="text-center mb-10">
      <div class="text-6xl mb-4">🌷</div>
      <h1 class="text-3xl font-bold text-pink-700">Paulina Match</h1>
      <p class="text-gray-600 mt-2 text-sm">Tu espacio para conocer a tu pareja desde adentro hacia afuera.</p>
    </div>
    <form id="login-form" class="space-y-4">
      <input id="login-email" type="email" required placeholder="tu@email.com"
        class="w-full px-4 py-3 rounded-xl border border-pink-200 bg-white/70 focus:outline-none focus:ring-2 focus:ring-pink-400" />
      <button type="submit"
        class="w-full bg-pink-600 hover:bg-pink-700 text-white font-semibold py-3 rounded-xl transition">
        Enviarme enlace
      </button>
    </form>
    <p id="login-msg" class="mt-4 text-center text-sm text-gray-600"></p>
  </div>
</div>

<!-- ========= APP ========= -->
<div id="view-app" class="hidden flex flex-col h-screen">

  <!-- Header -->
  <header class="bg-white/80 backdrop-blur border-b border-pink-100 px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <span class="text-2xl">🌷</span>
      <div>
        <div class="font-semibold text-pink-700 leading-tight">Paulina Match</div>
        <div id="status-line" class="text-xs text-gray-500 leading-tight">Conociéndote</div>
      </div>
    </div>
    <button id="logout-btn" class="text-xs text-gray-500 hover:text-pink-600">Salir</button>
  </header>

  <!-- Tabs -->
  <nav class="bg-white/60 border-b border-pink-100 flex">
    <button data-tab="chat" class="tab-btn flex-1 py-2.5 text-sm font-medium text-pink-700 border-b-2 border-pink-600">
      💬 Conversación
    </button>
    <button data-tab="profile" class="tab-btn flex-1 py-2.5 text-sm font-medium text-gray-500 border-b-2 border-transparent">
      ✨ Mi perfil
    </button>
  </nav>

  <!-- CHAT -->
  <section id="tab-chat" class="flex-1 flex flex-col overflow-hidden">
    <div id="messages" class="flex-1 overflow-y-auto px-4 py-5 space-y-3"></div>
    <div id="composer" class="border-t border-pink-100 bg-white/80 px-3 py-2 flex items-end gap-2">
      <textarea id="input" rows="1" placeholder="Escribe lo que sientas..."
        class="flex-1 px-3 py-2.5 rounded-2xl border border-pink-200 bg-white focus:outline-none focus:ring-2 focus:ring-pink-400 text-[15px] max-h-40"></textarea>
      <button id="send-btn"
        class="bg-pink-600 hover:bg-pink-700 text-white w-10 h-10 rounded-full flex items-center justify-center shrink-0 transition disabled:opacity-50">
        ➤
      </button>
    </div>
  </section>

  <!-- PROFILE -->
  <section id="tab-profile" class="hidden flex-1 overflow-y-auto px-4 py-5">
    <div id="profile-empty" class="text-center text-gray-500 mt-20 px-4 text-sm">
      <div class="text-5xl mb-3">🌱</div>
      Tu perfil se construirá conforme vayas conversando.<br>
      Cuando terminemos la charla, aquí verás un retrato tuyo.
    </div>
    <div id="profile-content" class="hidden space-y-5 fade-in"></div>
  </section>

</div>

<!-- ========= LOADING ========= -->
<div id="view-loading" class="fixed inset-0 flex items-center justify-center grad-bg">
  <div class="text-center">
    <div class="text-5xl animate-pulse">🌷</div>
    <p class="text-gray-500 mt-4 text-sm">Cargando...</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
<script>
// ================================================
// CONFIGURACIÓN
// Rellena estos dos valores con los de tu proyecto Supabase.
// Settings > API en el dashboard de Supabase.
// ================================================
const SUPABASE_URL = 'https://jgyjvrfpzgtzhgakwfuu.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpneWp2cmZwemd0emhnYWt3ZnV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NzU3OTIsImV4cCI6MjA5MjA1MTc5Mn0.7EsnIcKeo0l70osr11ysXR1MDsFicjh22PPxPWBiyNI'

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

const $ = (id) => document.getElementById(id)
const show = (id) => { $(id).classList.remove('hidden'); $(id).classList.add('flex') }
const hide = (id) => { $(id).classList.add('hidden'); $(id).classList.remove('flex') }

// -------- Vistas --------
function showLogin() {
  hide('view-loading'); hide('view-app')
  $('view-login').classList.remove('hidden')
  $('view-login').classList.add('flex')
}
function showApp() {
  hide('view-loading'); hide('view-login')
  $('view-app').classList.remove('hidden')
  $('view-app').classList.add('flex')
}

// -------- Login --------
$('login-form').addEventListener('submit', async (e) => {
  e.preventDefault()
  const email = $('login-email').value.trim()
  if (!email) return
  $('login-msg').textContent = 'Enviando...'
  const { error } = await sb.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: window.location.href },
  })
  $('login-msg').textContent = error
    ? 'Ups, algo falló: ' + error.message
    : '📩 Revisa tu correo — te envié un enlace para entrar.'
})

$('logout-btn').addEventListener('click', async () => {
  await sb.auth.signOut()
  location.reload()
})

// -------- Tabs --------
document.querySelectorAll('.tab-btn').forEach((btn) => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach((b) => {
      b.classList.remove('text-pink-700', 'border-pink-600')
      b.classList.add('text-gray-500', 'border-transparent')
    })
    btn.classList.add('text-pink-700', 'border-pink-600')
    btn.classList.remove('text-gray-500', 'border-transparent')
    const tab = btn.dataset.tab
    $('tab-chat').classList.toggle('hidden', tab !== 'chat')
    $('tab-chat').classList.toggle('flex', tab === 'chat')
    $('tab-profile').classList.toggle('hidden', tab !== 'profile')
    if (tab === 'profile') loadProfile()
  })
})

// -------- Chat --------
let sending = false

function addMessage(role, text) {
  const wrap = document.createElement('div')
  wrap.className = 'flex bubble-in ' + (role === 'user' ? 'justify-end' : 'justify-start')
  const bubble = document.createElement('div')
  bubble.className = role === 'user'
    ? 'max-w-[80%] bg-pink-600 text-white rounded-2xl rounded-br-md px-4 py-2.5 text-[15px] leading-relaxed shadow-sm'
    : 'max-w-[85%] bg-white text-gray-800 rounded-2xl rounded-bl-md px-4 py-2.5 text-[15px] leading-relaxed shadow-sm border border-pink-50'
  bubble.textContent = text
  wrap.appendChild(bubble)
  $('messages').appendChild(wrap)
  $('messages').scrollTop = $('messages').scrollHeight
}

function addTyping() {
  const wrap = document.createElement('div')
  wrap.id = 'typing-bubble'
  wrap.className = 'flex justify-start bubble-in'
  wrap.innerHTML = `<div class="bg-white rounded-2xl rounded-bl-md px-4 py-3 shadow-sm border border-pink-50 typing"><span></span><span></span><span></span></div>`
  $('messages').appendChild(wrap)
  $('messages').scrollTop = $('messages').scrollHeight
}

function removeTyping() {
  const t = $('typing-bubble')
  if (t) t.remove()
}

async function loadHistory() {
  $('messages').innerHTML = ''
  const { data, error } = await sb
    .from('onboarding_messages')
    .select('role, content, created_at')
    .order('created_at', { ascending: true })
  if (error) return
  if (!data || data.length === 0) {
    await sendToChat(null)
    return
  }
  data.forEach((m) => addMessage(m.role, m.content))
}

async function sendToChat(message) {
  if (sending) return
  sending = true
  $('send-btn').disabled = true
  addTyping()
  try {
    const { data: { session } } = await sb.auth.getSession()
    const res = await fetch(`${SUPABASE_URL}/functions/v1/chat`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${session.access_token}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ message }),
    })
    const data = await res.json()
    removeTyping()
    if (data.reply) addMessage('assistant', data.reply)
    if (data.profile_saved) {
      $('status-line').textContent = '✓ Onboarding completo'
      setTimeout(() => {
        alert('¡Terminamos la primera parte! Ahora puedes ver tu perfil en la pestaña "Mi perfil".')
      }, 600)
    }
    if (data.error) addMessage('assistant', '(Error: ' + data.error + ')')
  } catch (e) {
    removeTyping()
    addMessage('assistant', '(Error de conexión: ' + e.message + ')')
  } finally {
    sending = false
    $('send-btn').disabled = false
  }
}

$('send-btn').addEventListener('click', async () => {
  const text = $('input').value.trim()
  if (!text || sending) return
  $('input').value = ''
  $('input').style.height = 'auto'
  addMessage('user', text)
  await sendToChat(text)
})

$('input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault()
    $('send-btn').click()
  }
})

$('input').addEventListener('input', (e) => {
  e.target.style.height = 'auto'
  e.target.style.height = Math.min(e.target.scrollHeight, 160) + 'px'
})

// -------- Profile --------
async function loadProfile() {
  const { data } = await sb.from('user_profile').select('*').single()
  if (!data || data.onboarding_status !== 'completed') {
    $('profile-empty').classList.remove('hidden')
    $('profile-content').classList.add('hidden')
    return
  }
  $('profile-empty').classList.add('hidden')
  const c = $('profile-content')
  c.classList.remove('hidden')
  c.innerHTML = `
    <div class="bg-white rounded-2xl p-5 shadow-sm border border-pink-100">
      <div class="text-xs uppercase tracking-wide text-pink-600 font-semibold mb-2">Tu tarjeta para compartir</div>
      <p class="text-gray-800 text-[15px] leading-relaxed whitespace-pre-wrap">${escapeHtml(data.share_card_text || '')}</p>
      <button id="copy-card" class="mt-3 text-sm text-pink-600 hover:text-pink-700 font-medium">Copiar</button>
    </div>
    ${section('🌿 Valores', list(data.values_core))}
    ${section('✨ Green flags', list(data.green_flags))}
    ${section('🚫 Dealbreakers', list(data.dealbreakers))}
    ${data.relationship_goals ? section('💞 Qué busco', kv(data.relationship_goals)) : ''}
    ${data.past_patterns ? section('📖 Mis patrones', `<p class="text-gray-700 text-sm leading-relaxed">${escapeHtml(data.past_patterns)}</p>`) : ''}
    ${data.communication_style ? section('🗣️ Cómo me comunico', `<p class="text-gray-700 text-sm leading-relaxed">${escapeHtml(data.communication_style)}</p>`) : ''}
    ${data.life_stage ? section('🌻 Dónde estoy ahora', `<p class="text-gray-700 text-sm leading-relaxed">${escapeHtml(data.life_stage)}</p>`) : ''}
  `
  $('copy-card')?.addEventListener('click', () => {
    navigator.clipboard.writeText(data.share_card_text || '')
    $('copy-card').textContent = '✓ Copiado'
    setTimeout(() => ($('copy-card').textContent = 'Copiar'), 2000)
  })
}

function section(title, body) {
  return `<div class="bg-white rounded-2xl p-5 shadow-sm border border-pink-100">
    <div class="text-xs uppercase tracking-wide text-pink-600 font-semibold mb-2">${title}</div>
    ${body}
  </div>`
}
function list(arr) {
  if (!arr || !arr.length) return '<p class="text-gray-400 text-sm">—</p>'
  return '<ul class="space-y-1.5">' + arr.map((x) =>
    `<li class="text-gray-700 text-sm flex gap-2"><span class="text-pink-400 mt-1">•</span><span>${escapeHtml(x)}</span></li>`
  ).join('') + '</ul>'
}
function kv(obj) {
  if (!obj || typeof obj !== 'object') return ''
  return '<div class="space-y-1.5 text-sm">' + Object.entries(obj).map(([k, v]) =>
    `<div><span class="text-gray-500 capitalize">${escapeHtml(k)}:</span> <span class="text-gray-800">${escapeHtml(String(v))}</span></div>`
  ).join('') + '</div>'
}
function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, (c) =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])
  )
}

// -------- Init --------
async function init() {
  const { data: { session } } = await sb.auth.getSession()
  if (!session) {
    showLogin()
    return
  }
  showApp()
  const { data: prof } = await sb.from('user_profile').select('onboarding_status').single()
  if (prof?.onboarding_status === 'completed') {
    $('status-line').textContent = '✓ Onboarding completo'
  }
  await loadHistory()
}

sb.auth.onAuthStateChange((event) => {
  if (event === 'SIGNED_IN') location.reload()
})

init()

// -------- PWA service worker --------
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {})
  })
}
</script>
</body>
</html>
